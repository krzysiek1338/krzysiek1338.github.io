<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAJ GARDEN - Profesjonalne Usługi Ogrodnicze</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #1e3512; 
            background-image: linear-gradient(135deg, #1e3512 0%, #0f1c08 100%);
            font-family: 'Arial', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            width: 100%;
            background: #fff;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        .plakat-img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 6px;
        }
        @media (max-width: 480px) {
            body {
                padding: 10px;
            }
            .container {
                padding: 8px;
            }
        }
</style>
</head>
<body>
<div class="container">
<img src="zdjecie2.jpeg" alt="MAJ GARDEN - Oferta Usług Ogrodniczych" class="plakat-img">
</div>
</body>
</html>
